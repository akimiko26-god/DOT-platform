# Free tier on Render.com (https://render.com)
# 1. Push repo to GitHub
# 2. New -> Blueprint -> connect repo
# 3. After deploy open the service URL

services:
  - type: web
    name: dot-platform
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////app/backend/data/dot.db
      - key: PYTHON_VERSION
        value: "3.12.0"
