# Render Blueprint — https://dashboard.render.com/blueprint/new
# Repo: akimiko26-god/DOT-platform, branch: main

services:
  - type: web
    name: dot-platform
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////app/backend/data/dot.db
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SEED_DEMO
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
